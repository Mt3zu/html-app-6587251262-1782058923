<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نور AI - مساعد ذكي</title>
    <style>
        /* ============================================================
           CSS - التصميم الكامل
           ============================================================ */

        /* ===== إعادة تعيين ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #60a5fa;
            --bg: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-card: #262626;
            --bg-input: #0f0f0f;
            --text: #ffffff;
            --text-secondary: #888888;
            --border: #333333;
            --shadow: rgba(0, 0, 0, 0.5);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== وضع الإضاءة ===== */
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f0f2f5;
                --bg-secondary: #ffffff;
                --bg-card: #e8eaed;
                --bg-input: #f0f0f0;
                --text: #1a1a1a;
                --text-secondary: #5f6368;
                --border: #dadce0;
                --shadow: rgba(0, 0, 0, 0.1);
            }
        }

        /* ===== الأساسيات ===== */
        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            max-width: 480px;
            margin: 0 auto;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        /* ===== شريط الحالة ===== */
        .status-bar {
            background: var(--bg-secondary);
            padding: 6px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            user-select: none;
        }

        .status-bar .time {
            font-weight: 500;
        }

        .status-icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .status-icons .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }

        .status-icons .dot.offline {
            background: #ef4444;
        }

        /* ===== الهيدر ===== */
        .header {
            background: var(--bg-secondary);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .header-logo {
            font-size: 28px;
            line-height: 1;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-subtitle {
            font-size: 11px;
            color: var(--text-secondary);
            -webkit-text-fill-color: var(--text-secondary);
            display: block;
            margin-top: -2px;
        }

        .header-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .header-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition);
        }

        .header-btn:active {
            background: rgba(255, 255, 255, 0.08);
        }

        @media (prefers-color-scheme: light) {
            .header-btn:active {
                background: rgba(0, 0, 0, 0.08);
            }
        }

        /* ===== اختيار النموذج ===== */
        .model-selector {
            padding: 10px 16px 8px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .model-selector select {
            width: 100%;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            outline: none;
            transition: border-color var(--transition);
            font-family: inherit;
        }

        .model-selector select:focus {
            border-color: var(--primary);
        }

        .model-selector select option {
            background: var(--bg-secondary);
            color: var(--text);
            padding: 8px;
        }

        .model-selector select optgroup {
            background: var(--bg);
            color: var(--text-secondary);
            font-weight: 600;
            font-style: normal;
        }

        /* ===== منطقة المحادثة ===== */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
            overscroll-behavior: contain;
            background: var(--bg);
        }

        #chat::-webkit-scrollbar {
            width: 3px;
        }

        #chat::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        /* ===== الرسائل ===== */
        .msg {
            max-width: 88%;
            padding: 12px 16px;
            border-radius: var(--radius);
            animation: slideIn 0.35s ease;
            position: relative;
            word-wrap: break-word;
            line-height: 1.6;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .msg.user {
            align-self: flex-end;
            background: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg.ai {
            align-self: flex-start;
            background: var(--bg-card);
            border-bottom-left-radius: 4px;
        }

        .msg .model-badge {
            display: inline-block;
            font-size: 10px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 10px;
            border-radius: 12px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .msg.user .model-badge {
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.12);
        }

        .msg .content {
            white-space: pre-wrap;
            overflow-wrap: break-word;
            font-size: 15px;
        }

        .msg .timestamp {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 6px;
            display: block;
            opacity: 0.6;
        }

        .msg.user .timestamp {
            color: rgba(255, 255, 255, 0.6);
        }

        /* ===== رسالة الترحيب ===== */
        .welcome {
            text-align: center;
            padding: 50px 20px 30px;
            color: var(--text-secondary);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome .icon {
            font-size: 56px;
            display: block;
            margin-bottom: 16px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .welcome h2 {
            color: var(--text);
            font-size: 22px;
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 14px;
            line-height: 1.7;
            max-width: 280px;
            margin: 0 auto;
        }

        .welcome .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .welcome .features span {
            background: var(--bg-card);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid var(--border);
        }

        /* ===== مؤشر الكتابة ===== */
        .msg.typing {
            padding: 16px 20px;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dots span {
            width: 9px;
            height: 9px;
            background: var(--text-secondary);
            border-radius: 50%;
            display: inline-block;
            animation: dotBounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) {
            animation-delay: -0.32s;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: -0.16s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0s;
        }

        @keyframes dotBounce {
            0%,
            80%,
            100% {
                transform: scale(0.4);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ===== كود بلوك ===== */
        pre {
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin: 10px 0;
            direction: ltr;
            text-align: left;
            overflow: hidden;
            position: relative;
        }

        .code-header {
            background: var(--bg-secondary);
            padding: 6px 14px;
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .copy-btn {
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 2px 14px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: background var(--transition);
            font-family: inherit;
        }

        .copy-btn:active {
            background: var(--primary-dark);
            transform: scale(0.95);
        }

        pre code {
            display: block;
            padding: 14px 16px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 13px;
            white-space: pre;
            overflow-x: auto;
            color: #e0e0e0;
            line-height: 1.6;
        }

        /* ===== تنسيق النص داخل الرسالة ===== */
        .content strong {
            color: var(--primary-light);
        }

        .content code {
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .content ul,
        .content ol {
            margin: 8px 0;
            padding-right: 20px;
        }

        .content li {
            margin: 4px 0;
        }

        .content a {
            color: var(--primary-light);
            text-decoration: none;
        }

        .content a:active {
            text-decoration: underline;
        }

        .content blockquote {
            border-right: 3px solid var(--primary);
            padding-right: 12px;
            margin: 8px 0;
            color: var(--text-secondary);
        }

        /* ===== شريط الإدخال ===== */
        .input-bar {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 10px 12px;
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            position: relative;
        }

        .input-wrapper {
            flex: 1;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 4px 16px;
            display: flex;
            align-items: flex-end;
            transition: border-color var(--transition);
            min-height: 48px;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
        }

        #input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            padding: 10px 0;
            font-size: 16px;
            outline: none;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            line-height: 1.5;
            font-family: inherit;
            width: 100%;
        }

        #input::placeholder {
            color: var(--text-secondary);
        }

        #input:disabled {
            opacity: 0.5;
        }

        /* ===== زر الإرسال ===== */
        #send {
            background: var(--primary);
            border: none;
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            transition: all var(--transition);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        #send:active {
            transform: scale(0.92);
            background: var(--primary-dark);
        }

        #send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ===== إشعار ===== */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-secondary);
            color: var(--text);
            padding: 10px 22px;
            border-radius: 12px;
            font-size: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 30px var(--shadow);
            z-index: 100;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            white-space: nowrap;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== وضع عدم الاتصال ===== */
        .offline-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            animation: fadeIn 0.4s ease;
        }

        .offline-overlay.active {
            display: flex;
        }

        .offline-box {
            background: var(--bg-secondary);
            padding: 35px 30px;
            border-radius: var(--radius);
            max-width: 340px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .offline-box .icon {
            font-size: 52px;
            display: block;
            margin-bottom: 12px;
        }

        .offline-box h3 {
            font-size: 20px;
            margin-bottom: 6px;
            color: #ef4444;
        }

        .offline-box p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .retry-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            transition: background var(--transition);
            font-family: inherit;
        }

        .retry-btn:active {
            background: var(--primary-dark);
            transform: scale(0.97);
        }

        /* ===== شاشة التحميل ===== */
        .splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: var(--bg);
            position: fixed;
            inset: 0;
            z-index: 10000;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .splash.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .splash .logo {
            font-size: 72px;
            margin-bottom: 16px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .splash .name {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .splash .loader {
            margin-top: 24px;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== استجابة ===== */
        @media (max-width: 400px) {
            .header-title {
                font-size: 16px;
            }
            .msg {
                max-width: 92%;
                padding: 10px 14px;
                font-size: 14px;
            }
            .msg .content {
                font-size: 14px;
            }
            #input {
                font-size: 15px;
                padding: 8px 0;
            }
            .input-wrapper {
                min-height: 42px;
                padding: 2px 12px;
            }
            #send {
                width: 42px;
                height: 42px;
                font-size: 18px;
            }
            .welcome h2 {
                font-size: 18px;
            }
            .welcome .icon {
                font-size: 44px;
            }
        }

        @media (min-width: 768px) {
            body {
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
                max-height: 95vh;
                margin-top: 2.5vh;
                border-radius: var(--radius);
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            }
        }

        /* ===== تحسينات إضافية ===== */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .gap-2 {
            gap: 8px;
        }

        /* ===== نهاية CSS ===== */
    </style>
</head>
<body>

    <!-- ===== شاشة التحميل ===== -->
    <div class="splash" id="splash">
        <div class="logo">🤖</div>
        <div class="name">نور AI</div>
        <div class="loader"></div>
    </div>

    <!-- ===== شريط الحالة ===== -->
    <div class="status-bar">
        <span class="time" id="statusTime">--:--</span>
        <div class="status-icons">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">متصل</span>
        </div>
    </div>

    <!-- ===== الهيدر ===== -->
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <span class="header-logo">🤖</span>
                <div>
                    <span class="header-title">نور AI</span>
                    <span class="header-subtitle">مساعد ذكي متعدد النماذج</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="clearBtn" title="مسح المحادثة" aria-label="مسح">🗑️</button>
                <button class="header-btn" id="scrollBtn" title="التمرير للأسفل" aria-label="أسفل">⬇️</button>
            </div>
        </div>
    </header>

    <!-- ===== اختيار النموذج ===== -->
    <div class="model-selector">
        <select id="modelSelect">
            
                <option value="google/gemini-2.5-flash-lite">⚡ Gemini 2.5 Flash Lite</option>
                <option value="qwen/qwen3-32b">⚡ Qwen3 32B</option>
                <option value="openai/gpt-5-mini">⚡ GPT-5 Mini</option>
            </optgroup>
            
                <option value="qwen/qwen-coder-32b">💻 Qwen Coder 32B</option>
                <option value="deepseek/deepseek-chat">💻 DeepSeek Chat</option>
                <option value="grok/grok-4-fast">💻 Grok 4 Fast</option>
            </optgroup>
   
                <option value="perplexity">🌐 Perplexity</option>
                <option value="claude">🌐 Claude</option>
                <option value="openai">🌐 OpenAI</option>
                <option value="deepseek">🌐 DeepSeek</option>
                <option value="gemini">🌐 Gemini</option>
                <option value="llama">🌐 Llama</option>
            </optgroup>
        </select>
    </div>

    <!-- ===== منطقة المحادثة ===== -->
    <div id="chat">
        <div class="welcome">
            <span class="icon">✨</span>
            <h2>مرحباً بك في نور AI</h2>
            <p>اختر نموذجاً من الأعلى وابدأ المحادثة<br>📱 12 نموذج ذكاء اصطناعي في تطبيق واحد</p>
            <div class="features">
                <span>⚡ سريع</span>
                <span>💻 متوسط</span>
                <span>🌐 متقدم</span>
            </div>
        </div>
    </div>

    <!-- ===== شريط الإدخال ===== -->
    <div class="input-bar">
        <div class="input-wrapper">
            <textarea id="input" rows="1" placeholder="اكتب رسالتك..." enterkeyhint="send"></textarea>
        </div>
        <button id="send" aria-label="إرسال">↑</button>
    </div>

    <!-- ===== إشعار ===== -->
    <div class="toast" id="toast"></div>

    <!-- ===== وضع عدم الاتصال ===== -->
    <div class="offline-overlay" id="offlineOverlay">
        <div class="offline-box">
            <span class="icon">📡</span>
            <h3>أنت غير متصل</h3>
            <p>يرجى التحقق من اتصال الإنترنت وإعادة المحاولة.</p>
            <button class="retry-btn" id="retryBtn">🔄 إعادة المحاولة</button>
        </div>
    </div>

    <script>
        /* ================================================================
           JAVASCRIPT - التطبيق الكامل
           ================================================================ */

        (function() {
            'use strict';

            // ===== عناصر DOM =====
            const splash = document.getElementById('splash');
            const chat = document.getElementById('chat');
            const input = document.getElementById('input');
            const sendBtn = document.getElementById('send');
            const modelSelect = document.getElementById('modelSelect');
            const clearBtn = document.getElementById('clearBtn');

            let isOffline = false;

            // ===== التوكنات (مضمنة) =====
            const CONFIG = {
                SEEK_TOKEN: "eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJzdWIiOiJBUy1YNkNZUiIsImF1ZCI6ImFpLXNlZWsiLCJwcm92aWRlciI6InV1aWQiLCJpc3MiOiJhaS1zZWVrIiwiZXhwIjoyMDkzMTk5ODY1LCJpYXQiOjE3Nzc4Mzk4NjV9.w2wlNLg2S-om4xqWmakO2tEUjiPjxtGwFozmoI217VUu7KGC1O3qaL7KdyEIBYrGxIZV3lMWospZPPgVOYJjOeDgKBFnhg1_7NRKfmCEum_0moUEqH6dGFtQUQixDi63k63wv6GhOs1Sorj6hLzdBxX6NHU6otOo6brls5UNYbc",
                FIREBASE_KEY: "AIzaSyA27E7jUV8osRY7NzwP2fZwGoTkp5gJhZw"
            };

            // ===== تعريف النماذج =====
            const SECTIONS = {
                fast: {
                    title: "🔴 سريع",
                    models: ["google/gemini-2.5-flash-lite", "qwen/qwen3-32b", "openai/gpt-5-mini"],

            // ===== دوال مساعدة =====
            function getModelSource(model) {
                for (const sec of Object.values(SECTIONS)) {
                    if (sec.models.includes(model)) return sec.source;
                }
                return "seek";
            }

            function getModelDisplayName(model) {
                for (const sec of Object.values(SECTIONS)) {
                    if (sec.models.includes(model)) {
                        if (model.includes('/')) return model.split('/').pop().replace(/-/g, ' ');
                        return model.charAt(0).toUpperCase() + model.slice(1);
                    }
                }
                return model;
            }

            function getModelFullName(model) {
                for (const sec of Object.values(SECTIONS)) {
                    if (sec.models.includes(model)) {
                        const emoji = sec.title.split(' ')[0];
                        return `${emoji} ${getModelDisplayName(model)}`;
                    }
                }
                return model;
            }

            function getEmojiForModel(model) {
                for (const sec of Object.values(SECTIONS)) {
                    if (sec.models.includes(model)) {
                        return sec.title.split(' ')[0] || '🤖';
                    }
                }
                return '🤖';
            }

            // ===== الساعة =====
            function updateClock() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                statusTime.textContent = `${h}:${m}`;
            }
            setInterval(updateClock, 10000);
            updateClock();

            // ===== عرض الإشعارات =====
            let toastTimeout = null;

            function showToast(message, duration = 2000) {
                toast.textContent = message;
                toast.classList.add('show');
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, duration);
            }

            // ===== حالة الاتصال =====
            function updateStatus(online) {
                isOffline = !online;
                if (online) {
                    statusDot.className = 'dot';
                    statusText.textContent = 'متصل';
                    offlineOverlay.classList.remove('active');
                } else {
                    statusDot.className = 'dot offline';
                    statusText.textContent = 'غير متصل';
                    offlineOverlay.classList.add('active');
                }
            }

            function checkConnection() {
                const online = navigator.onLine;
                updateStatus(online);
                return online;
            }

            // ===== عرض رسالة =====
            function addMessage(text, type, modelName = '') {
                const div = document.createElement('div');
                div.className = `msg ${type}`;
                div.id = `msg-${Date.now()}-${messageCount++}`;

                let content = '';
                const time = new Date().toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });

                if (type === 'ai') {
                    const badge = modelName || 'المساعد';
                    content += `<span class="model-badge">${badge}</span>`;
                    content += `<div class="content">${renderMarkdown(text)}</div>`;
                } else {
                    content += `<div class="content">${escapeHtml(text)}</div>`;
                }

                content += `<span class="timestamp">${time}</span>`;
                div.innerHTML = content;

                // إزالة الترحيب
                const welcome = chat.querySelector('.welcome');
                if (welcome) welcome.remove();

                chat.appendChild(div);
                scrollToBottom();
                return div;
            }

            // ===== مؤشر الكتابة =====
            function addTypingIndicator() {
                const div = document.createElement('div');
                div.className = 'msg ai typing';
                div.id = 'typing-indicator';
                div.innerHTML = `
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                `;
                chat.appendChild(div);
                scrollToBottom();
                return div;
            }

            function removeTypingIndicator() {
                const typing = document.getElementById('typing-indicator');
                if (typing) typing.remove();
            }

            // ===== التمرير =====
            function scrollToBottom() {
                setTimeout(() => {
                    chat.scrollTop = chat.scrollHeight;
                }, 50);
            }

            // ===== هروب HTML =====
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // ===== عرض Markdown =====
            function renderMarkdown(text) {
                let html = escapeHtml(text);

                // كود بلوك
                html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, function(match, lang, code) {
                    const id = 'code-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
                    return `<pre>
                        <div class="code-header">
                            <span>${lang || 'code'}</span>
                            <button class="copy-btn" onclick="window.copyCode('${id}')">📋 نسخ</button>
                        </div>
                        <code id="${id}">${code.trim()}</code>
                    </pre>`;
                });

                // كود inline
                html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

                // بولد
                html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

                // خطوط جديدة
                html = html.replace(/\n/g, '<br>');

                return html;
            }

            // ===== نسخ الكود =====
            window.copyCode = function(id) {
                const codeEl = document.getElementById(id);
                if (!codeEl) return;
                const text = codeEl.textContent;

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => {
                        const btn = codeEl.closest('pre').querySelector('.copy-btn');
                        const original = btn.textContent;
                        btn.textContent = '✅ تم';
                        setTimeout(() => { btn.textContent = original; }, 1500);
                        showToast('📋 تم نسخ الكود!', 1200);
                    }).catch(() => fallbackCopy(text));
                } else {
                    fallbackCopy(text);
                }
            };

            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('📋 تم نسخ الكود!', 1200);
            }

            // ===== دوال API =====
            async function getFirebaseToken() {
                try {
                    const url =
                        `https://www.googleapis.com/identitytoolkit/v3/relyingparty/signupNewUser?key=${CONFIG.FIREBASE_KEY}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'User-Agent': 'Dalvik/2.1.0 (Linux; U; Android 16)'
                        },
                        body: JSON.stringify({ clientType: "CLIENT_TYPE_ANDROID" })
                    });
                    if (!response.ok) throw new Error('Firebase auth failed');
                    const data = await response.json();
                    return 'Bearer ' + data.idToken;
                } catch (e) {
                    console.error('Firebase token error:', e);
                    return null;
                }
            }

            async function callSeekAPI(model, text) {
                try {
                    const ms = Date.now();
                    const rand = Math.floor(Math.random() * Number.MAX_SAFE_INTEGER);
                    const uuidInt = (BigInt(ms) << 80n) | (0x7n << 76n) | (BigInt(rand) & 0x0FFFFFFFFFFFFFFFFFFFFFFFn);
                    const h = uuidInt.toString(16).padStart(32, '0');
                    const aiMessageId =
                        `${h.slice(0,8)}-${h.slice(8,12)}-${h.slice(12,16)}-${h.slice(16,20)}-${h.slice(20,32)}`;

                    const payload = {
                        sessionId: "019def83-b582-7410-95dd-b747cc648582",
                        userMessageId: "019def8d-103e-78ba-9329-c9b714b900d0",
                        aiMessageId: aiMessageId,
                        model: model,
                        text: text,
                        restrictedType: "FREE_USER",
                        sessionType: "NORMAL"
                    };

                    const response = await fetch('https://ai-seek.thebetter.ai/v4/chat/send', {
                        method: 'POST',
                        headers: {
                            'User-Agent': 'okhttp/4.12.0',
                            'Accept': 'text/event-stream',
                            'Content-Type': 'application/json',
                            'x-app-id': 'ai-seek',
                            'x-device-info': 'appIdentifier=ai.chatbot.ask.chat.deep.seek.assistant.search.free;appVersion=2.7.1-26042486',
                            'x-access-token': CONFIG.SEEK_TOKEN
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let answer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n');
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    if (data.content) {
                                        answer += data.content;
                                    }
                                } catch (e) { /* ignore */ }
                            }
                        }
                    }

                    return answer || 'لم يتم استلام رد';
                } catch (e) {
                    console.error('Seek API error:', e);
                    return `⚠️ خطأ: ${e.message}`;
                }
            }

            async function callSearchAPI(model, text) {
                try {
                    const token = await getFirebaseToken();
                    if (!token) return '⚠️ فشل الحصول على توكن Firebase';

                    const cfg = SEARCH_CFG[model] || SEARCH_CFG.perplexity;
                    const payload = {
                        provider: model,
                        prompt: `You MUST answer in English only.\nUser question:\n${text}`,
                        plan: "ULTRA",
                        app_version: cfg.app_version
                    };

                    const response = await fetch(
                        'https://ai-multi-search-backend-321697147922.europe-west6.run.app/ask', {
                            method: 'POST',
                            headers: {
                                'User-Agent': 'okhttp/4.12.0',
                                'authorization': token,
                                'x-plan': 'ULTRA',
                                'x-app-version': cfg.app_version,
                                'x-search-id': cfg.search_id,
                                'x-search-expected': '2',
                                'content-type': 'application/json; charset=utf-8'
                            },
                            body: JSON.stringify(payload)
                        }
                    );

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    return data.answer || 'لا توجد نتيجة';
                } catch (e) {
                    console.error('Search API error:', e);
                    return `⚠️ خطأ: ${e.message}`;
                }
            }

            async function sendMessage(model, text) {
                const source = getModelSource(model);
                if (source === 'seek') {
                    return await callSeekAPI(model, text);
                } else {
                    return await callSearchAPI(model, text);
                }
            }

            // ===== إرسال رسالة =====
            async function handleSend() {
                const text = input.value.trim();
                if (!text || isProcessing) return;

                if (!checkConnection()) {
                    showToast('⚠️ أنت غير متصل بالإنترنت', 3000);
                    return;
                }

                isProcessing = true;
                sendBtn.disabled = true;
                input.disabled = true;

                addMessage(text, 'user');

                input.value = '';
                input.style.height = 'auto';

                const typing = addTypingIndicator();

                const model = modelSelect.value;
                const modelName = getModelFullName(model);

                try {
                    const reply = await sendMessage(model, text);
                    removeTypingIndicator();

                    if (reply && reply.length > 0 && !reply.startsWith('⚠️')) {
                        addMessage(reply, 'ai', modelName);
                    } else {
                        addMessage(reply || '⚠️ لم يتم استلام رد', 'ai', '⚠️ خطأ');
                    }
                } catch (e) {
                    removeTypingIndicator();
                    addMessage(`⚠️ خطأ: ${e.message}`, 'ai', '⚠️ خطأ');
                } finally {
                    isProcessing = false;
                    sendBtn.disabled = false;
                    input.disabled = false;
                    input.focus();
                }
            }

            // ===== مسح المحادثة =====
            function clearChat() {
                const messages = chat.querySelectorAll('.msg');
                messages.forEach(el => el.remove());

                const welcome = document.createElement('div');
                welcome.className = 'welcome';
                welcome.innerHTML = `
                    <span class="icon">✨</span>
                    <h2>مرحباً بك في نور AI</h2>

                    <div class="features">
                        <span>⚡ سريع</span>
                        <span>💻 متوسط</span>
                        <span>🌐 متقدم</span>
                    </div>
                `;
                chat.appendChild(welcome);
                messageCount = 0;
                showToast('🧹 تم مسح المحادثة', 1500);
            }

            // ===== ضبط ارتفاع المدخل =====
            function autoResize() {
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 120) + 'px';
            }

            // ===== أحداث =====
            sendBtn.addEventListener('click', handleSend);

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });

            input.addEventListener('input', autoResize);

            clearBtn.addEventListener('click', function() {
                if (chat.querySelectorAll('.msg').length > 0) {
                    clearChat();
                } else {
                    showToast('المحادثة فارغة بالفعل', 1500);
                }
            });

            scrollBtn.addEventListener('click', scrollToBottom);

            retryBtn.addEventListener('click', function() {
                if (navigator.onLine) {
                    updateStatus(true);
                    showToast('✅ تم استعادة الاتصال', 1500);
                } else {
                    showToast('⚠️ لا يزال غير متصل', 2000);

            // ===== مراقبة الاتصال =====
            window.addEventListener('online', function() {
                updateStatus(true);
                showToast('✅ تم استعادة الاتصال', 2000);
            });

            window.addEventListener('offline', function() {
                updateStatus(false);
                showToast('⚠️ فقدان الاتصال بالإنترنت', 3000);
            });

            // ===== إخفاء شاشة التحميل =====
            function hideSplash() {
                splash.classList.add('hidden');
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 600);
            }

            // ===== التركيز =====
            document.addEventListener('DOMContentLoaded', function() {
                setTimeout(() => {
                    hideSplash();
                    input.focus();
                    checkConnection();
                }, 800);
            });

            // ===== معالجة لوحة المفاتيح على الموبايل =====
            if (window.visualViewport) {
                let lastHeight = window.visualViewport.height;
                window.visualViewport.addEventListener('resize', function() {
                    const diff = lastHeight - window.visualViewport.height;
                    if (diff > 100) {
                        setTimeout(scrollToBottom, 350);
                    }
                    lastHeight = window.visualViewport.height;
                });
            }

            // ===== إعادة التركيز بعد التفاعل =====
            document.addEventListener('click', function() {
                if (!isProcessing && document.activeElement !== input) {
                    // نترك المستخدم يختار
                }
            });

            console.log('🤖 نور AI - جاهز للاستخدام');
            console.log(`📱 النماذج المتاحة: ${modelSelect.options.length}`);

        })();
    </script>
